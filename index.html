<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineáris Űr-Navigátor | Halász-Vetró Tamara</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #1a1a2e; color: #ededed; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #16213e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        h1 { color: #0f3460; background: #e94560; display: inline-block; padding: 10px 20px; border-radius: 10px; margin-top: 0;}
        p { font-size: 1.2em; line-height: 1.5; color: #b1b1b1; margin-bottom: 30px;}
        .game-area { background: #fff; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Lineáris Űr-Navigátor</h1>
        <p>Mentsd meg az űrállomást! Navigáld a hajód egy <b>f(x) = ax + b</b> lineáris függvény segítségével. Találd meg a tökéletes meredekséget (a) és magasságot (b), hogy egyenes vonalban elkerüld az aszteroidákat és dokkolj a célállomáson!</p>
        
        <div class="game-area">
            <iframe src="https://www.geogebra.org/classic/mwygu79r?embed" width="800" height="600" allowfullscreen style="border: 1px solid #e4e4e4;border-radius: 4px;" frameborder="0"></iframe>
        </div>
    </div>
</body>
</html>
